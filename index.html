
<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F9F7F2">
    <link rel="manifest" href="/manifest.json">
    <title>Gemynd | Story Scribe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { 
              sans: ['Inter', 'sans-serif'], 
              serif: ['Lora', 'serif'],
              display: ['Playfair Display', 'serif']
            },
            colors: { 
              gemynd: {
                linen: '#F9F7F2',
                mahogany: '#0D0B0A',
                oxblood: '#962D2D',
                agedGold: '#D4AF37',
                ink: '#1A1715',
                red: '#A82D2D',
                gold: '#EAB308',
                terracotta: '#C97759',
                sienna: '#8B4513',
                cream: '#FCF9F6',
                deepBrown: '#2A2522',
                softPeach: '#E8E2D9'
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.9);
        --glass-border: rgba(42, 37, 34, 0.15);
        --glass-blur: 20px;
        --bg-main: #F9F7F2; 
        --text-main: #1A1715;
        --text-secondary: #4A4542;
        --text-muted: #8E8986;
      }
      
      .dark {
        --glass-bg: rgba(13, 11, 10, 0.88);
        --glass-border: rgba(255, 255, 255, 0.12);
        --glass-blur: 24px;
        --bg-main: #0D0B0A; 
        --text-main: #F9F7F2;
        --text-secondary: #D1CDC7;
        --text-muted: #8C8884;
      }

      body { 
        overscroll-behavior-y: none;
        background-color: var(--bg-main);
        color: var(--text-main);
        margin: 0;
        height: 100svh;
        width: 100%;
        position: fixed;
        transition: background-color 0.8s ease, color 0.3s ease;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .glass-tier-1 {
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--glass-border);
        box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.15);
      }

      .glass-tier-2 {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      }

      .dark .glass-tier-2 {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .scroll-viewport {
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
        padding-bottom: env(safe-area-inset-bottom, 140px);
      }

      .haptic-tap:active { transform: scale(0.96); transition: transform 0.1s; }

      .paper-grain::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 50;
      }

      ::-webkit-scrollbar { width: 0px; }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
      .pt-safe { padding-top: env(safe-area-inset-top, 0px); }

      /* Animation Primitives */
      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
      .animate-slide-up { animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
    <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",

    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.473.0?deps=react@^19.2.0,react-dom@^19.2.0",
    "pdfjs-dist": "https://aistudiocdn.com/pdfjs-dist@^5.4.449",
    "qrcode.react": "https://esm.sh/qrcode.react@^4.0.0?deps=react@^19.2.0,react-dom@^19.2.0",
    "jszip": "https://esm.sh/jszip@^3.10.1",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@^5.0.7",
    "jspdf": "https://esm.sh/jspdf@^4.0.0",
    "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.48.1/+esm",
    "idb": "https://aistudiocdn.com/idb@^8.0.3"
  }
}
</script>
  </head>
  <body class="paper-grain">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
