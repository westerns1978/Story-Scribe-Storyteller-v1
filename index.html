              display: ['"Crimson Pro"', 'serif']

                linen: '#FAF0E4',
                parchment: '#EDE4D3',
                warmGold: '#C4973B',
                burgundy: '#8B2E3B',
                sage: '#7A8B6F',
                ink: '#2C2418',
                inkSoft: '#5C4F3D',
                inkMuted: '#8A7E6D'
              },
              gemynd: {
                linen: '#FAF0E4',
                ink: '#2C2418',
                oxblood: '#8B2E3B',
                red: '#A63D4D',
                mahogany: '#1a1210',
                agedGold: '#C4973B',
                softPeach: '#EDE4D3'
              }
            },
            boxShadow: {
              'warm': '0 10px 30px -5px rgba(44, 36, 24, 0.12)',
              'warm-lg': '0 20px 50px -10px rgba(44, 36, 24, 0.18)'

    <style>
      :root {
        --bg-main: #FDF6EC; 
        --text-main: #2C2418;
        --text-secondary: #5C4F3D;
        --border-main: #EDE4D3;
        font-size: 16px;
      }
      
      body { 
        color: var(--text-main);
        background-color: var(--bg-main);
        margin: 0;
        width: 100%;
        font-family: 'DM Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* Elderly Accessibility Mode */
      .elderly-mode {
          font-size: 17px;
      }

      .elderly-mode button {
          min-height: 62px;
      }

      .elderly-mode .nav-item {
          min-height: 58px;
      }

      .elderly-mode .connie-fab {
          width: 76px;
          height: 76px;
      }

      .elderly-mode p,
      .elderly-mode span,
      .elderly-mode div {
          line-height: 1.6;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border-main);
      }

      .haptic-tap:active { transform: scale(0.97); transition: transform 0.1s; }

      .paper-texture::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 50;
        opacity: 0.5;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #EDE4D3; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #C4973B; }

      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slide-up { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .animate-appear { animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
